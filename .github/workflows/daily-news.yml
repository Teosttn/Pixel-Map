name: Daily News Bot

on:
  schedule:
    # 08:30 Asia/Shanghai
    - cron: "30 0 * * *"
    # 09:10 Asia/Shanghai catch-up
    - cron: "10 1 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Regenerate the current Shanghai date when a digest already exists.
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: daily-news
      cancel-in-progress: false
    outputs:
      changed: ${{ steps.fetch.outputs.changed }}
      digest_path: ${{ steps.fetch.outputs.digest_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: |
          npm ci
          test -x node_modules/.bin/next

      - name: Fetch daily news
        id: fetch
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_OPENAI_MODEL: ${{ vars.NEWS_OPENAI_MODEL }}
        run: |
          test -n "$OPENAI_API_KEY"
          if [ "${{ inputs.force }}" = "true" ]; then
            npm run news:fetch -- --force
          else
            npm run news:fetch
          fi

      - name: Validate generated news
        if: steps.fetch.outputs.changed == 'true'
        run: |
          npm run test:news
          npm run test:content
          npm run typecheck

      - name: Build site
        if: steps.fetch.outputs.changed == 'true'
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.base_url }}
          NEXT_PUBLIC_GITHUB_REPOSITORY: ${{ github.repository }}
          NEXT_PUBLIC_GITHUB_BRANCH: main
        run: npm run build

      - name: Commit and push generated news
        if: steps.fetch.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/news src/content/config/news-seen.json
          git commit -m "chore(news): publish daily digest"
          git push origin HEAD:main

      - name: Upload Pages artifact
        if: steps.fetch.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    needs: generate
    if: needs.generate.outputs.changed == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
